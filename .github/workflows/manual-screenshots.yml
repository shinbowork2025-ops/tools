name: Manual screenshots

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Start local server
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/manual-screenshot-server.log 2>&1 &
          echo $! > /tmp/manual-screenshot-server.pid
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/manual-screenshot-server.log
          exit 1

      - name: Capture screenshots
        run: npm run screenshots

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-screenshots
          path: manual/output/
          if-no-files-found: error
          retention-days: 30
